<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluffia | High-End Floral Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=IBM+Plex+Sans+Arabic:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* CSS Variables for Theming */
        :root[data-theme="light"] {
            --bg: #fdf6f6;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --accent: #fb6f92;
            --secondary: #ffc2d1;
            --nav-bg: rgba(253, 246, 246, 0.85);
        }

        :root[data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #f5f5f5;
            --accent: #ff8fab;
            --secondary: #4a1d28;
            --nav-bg: rgba(18, 18, 18, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s, color 0.4s; }
        body { 
            font-family: 'Playfair Display', serif; 
            background-color: var(--bg); 
            color: var(--text);
            overflow-x: hidden;
        }

        body.rtl { font-family: 'IBM Plex Sans Arabic', sans-serif; direction: rtl; }

        /* UI Helpers */
        .container { padding: 0 10%; }
        
        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 10%; position: fixed; width: 100%; z-index: 1000;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--secondary);
        }
        .logo { font-size: 1.6rem; font-weight: bold; letter-spacing: 3px; }
        .controls { display: flex; gap: 15px; align-items: center; }
        .btn-icon { 
            background: none; border: 1px solid var(--secondary); 
            color: var(--text); padding: 5px 12px; cursor: pointer; 
            border-radius: 20px; font-size: 0.8rem;
        }

        /* Hero */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            position: relative;
        }
        .hero h1 { font-size: 10vw; line-height: 1; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; font-style: italic; opacity: 0.8; }

        /* Floating Petals Container */
        #petals-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Shop Section */
        .section { padding: 100px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        
        .card {
            background: var(--card-bg); padding: 15px; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
        }
        .card img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(20%); transition: 0.5s; }
        .card:hover img { filter: grayscale(0%); transform: scale(1.02); }
        
        .coming-soon {
            display: inline-block; margin-top: 15px; padding: 6px 20px;
            background: var(--secondary); color: var(--accent);
            font-size: 0.7rem; font-weight: bold; border-radius: 30px;
        }

        /* Pop-up Tab (Modal) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); padding: 50px; text-align: center;
            width: 90%; max-width: 500px; border-radius: 20px;
        }

        .main-btn {
            background: var(--accent); color: white; border: none;
            padding: 12px 35px; cursor: pointer; border-radius: 50px;
            font-family: inherit; margin-top: 20px;
        }

        /* Animations */
        .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Our Newsletter</h2>
            <p id="modal-desc">Stay updated with our blooming collections.</p>
            <input type="email" placeholder="Email address" style="width: 100%; padding: 10px; margin-top: 20px; background: var(--bg); border: 1px solid var(--secondary); color: var(--text);">
            <button class="main-btn" onclick="closePopup()">Subscribe</button>
        </div>
    </div>

    <nav>
        <div class="logo">FLUFFIA</div>
        <div class="controls">
            <button class="btn-icon" onclick="toggleLanguage()" id="lang-btn">العربية</button>
            <button class="btn-icon" onclick="toggleTheme()" id="theme-btn">🌙 Night</button>
        </div>
    </nav>

    <div id="petals-container"></div>

    <section class="hero container">
        <h1 class="reveal" id="hero-title">Fluffia</h1>
        <p class="reveal" id="hero-sub">Stimulate your senses with premium florals</p>
        <button class="main-btn reveal" onclick="openPopup()" id="hero-btn">Explore Studio</button>
    </section>

    <section class="section container" id="shop">
        <h2 class="reveal" id="shop-title">Special Offers</h2>
        <div class="grid">
            <div class="card reveal">
                <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=600" alt="Flowers">
                <h3 id="p1-title">Velvet Rose</h3>
                <span class="coming-soon" data-i18n="soon">Coming Soon</span>
            </div>
            <div class="card reveal">
                <img src="https://images.unsplash.com/photo-1561181286-d3fee7d55364?auto=format&fit=crop&q=80&w=600" alt="Flowers">
                <h3 id="p2-title">Spring Bloom</h3>
                <span class="coming-soon" data-i18n="soon">Coming Soon</span>
            </div>
        </div>
    </section>

    <script>
        // Language Data
        const i18n = {
            en: {
                heroTitle: "Fluffia",
                heroSub: "Stimulate your senses with premium florals",
                heroBtn: "Explore Studio",
                shopTitle: "Special Offers",
                soon: "Coming Soon",
                langBtn: "العربية",
                themeNight: "🌙 Night",
                themeDay: "☀️ Day",
                p1: "Velvet Rose",
                p2: "Spring Bloom"
            },
            ar: {
                heroTitle: "فلافيا",
                heroSub: "أيقظ حواسك مع تشكيلات الزهور الفاخرة",
                heroBtn: "اكتشف الاستوديو",
                shopTitle: "عروض خاصة",
                soon: "قريباً",
                langBtn: "English",
                themeNight: "🌙 ليل",
                themeDay: "☀️ نهار",
                p1: "ورد الفلفيت",
                p2: "نسيم الربيع"
            }
        };

        let currentLang = 'en';

        // 1. Language Toggle Logic
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            
            document.getElementById('hero-title').innerText = i18n[currentLang].heroTitle;
            document.getElementById('hero-sub').innerText = i18n[currentLang].heroSub;
            document.getElementById('hero-btn').innerText = i18n[currentLang].heroBtn;
            document.getElementById('shop-title').innerText = i18n[currentLang].shopTitle;
            document.getElementById('lang-btn').innerText = i18n[currentLang].langBtn;
            document.getElementById('p1-title').innerText = i18n[currentLang].p1;
            document.getElementById('p2-title').innerText = i18n[currentLang].p2;
            
            document.querySelectorAll('[data-i18n="soon"]').forEach(el => {
                el.innerText = i18n[currentLang].soon;
            });
        }

        // 2. Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('theme-btn').innerText = newTheme === 'light' ? '🌙 Night' : '☀️ Day';
        }

        // 3. GSAP Animations & Petals
        gsap.to(".reveal", { opacity: 1, y: 0, duration: 1, stagger: 0.2, ease: "power2.out" });

        const petalsContainer = document.getElementById('petals-container');
        for (let i = 0; i < 20; i++) {
            const petal = document.createElement('div');
            petal.innerHTML = '🌸';
            petal.style.position = 'absolute';
            petal.style.fontSize = Math.random() * 20 + 10 + 'px';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.top = -50 + 'px';
            petal.style.opacity = Math.random();
            petalsContainer.appendChild(petal);

            gsap.to(petal, {
                y: window.innerHeight + 100,
                x: "+=100",
                rotation: 360,
                duration: Math.random() * 10 + 5,
                repeat: -1,
                delay: Math.random() * 5,
                ease: "none"
            });
        }

        // 4. Modal Logic
        function openPopup() { document.getElementById('modal').style.display = 'block'; }
        function closePopup() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
